<div class="flex h-screen w-full flex-col lg:flex-row">
  <div class="flex flex-col bg-pink-200 text-purple-500 flex-1 p-3 space-y-5">
    <span class="title">Input</span>
    <div class="flex flex-row justify-between items-center divide-x-4 divide-purple-400 divide-double">
      <div class="mb-4 flex-1 mr-2">
        <label class="block text-purple-400 text-sm font-bold mb-2" for="name">
          Characters
        </label>
        <input
        class="shadow appearance-none border rounded w-full py-2 px-3 text-purple-400 leading-tight focus:outline-none focus:shadow-outline"
        id="name"
        type="text"
        placeholder="Name"
        [(ngModel)]="characters">
      </div>
      <div class="mb-4 flex-1 pl-2">
        <label class="block text-purple-400 text-sm font-bold mb-2" for="employeeNumber">
          Length
        </label>
        <input class="shadow appearance-none border rounded w-full py-2 px-3 text-purple-400 leading-tight focus:outline-none focus:shadow-outline"
        id="employeeNumber"
        type="tel"
        placeholder="Employee Number"
        [(ngModel)]="length">
      </div>
    </div>
    <button (click)="buttonHandler()" class="button-primary">RANDOM PASSWORD</button>
  </div>
  <div class="flex flex-col bg-purple-200 text-pink-500 flex-1 p-3">
    <div>
      <span class="title">Password</span>
    </div>
    <div class="flex flex-col flex-1 justify-center items-center">
      <span class="password">{{password}}</span>
    </div>
  </div>
</div>
